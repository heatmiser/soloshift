---
# Install roles:  ansible-galaxy role install --roles-path=./roles -r requirements.yaml
# Install collections: ansible-galaxy collection install -r requirements.yaml

roles:
  - src: https://github.com/heatmiser/ansible-role-redhat-subscription
    version: master
    name: devnullcake.redhat-subscription

collections:
  - name: ansible.posix
  - name: community.crypto
  - name: community.docker
  - name: community.general
  - name: community.libvirt
  - name: kubernetes.core
