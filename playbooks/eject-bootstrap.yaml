---
- name: Remove bootstrap VM and update HAProxy configuration
  hosts: hypervisor
  become: true
  tasks:
    - name: Capture ansible-playbook working directory
      run_once: true
      ansible.builtin.set_fact:
        ansible_playbook_pwd: "{{ lookup('env', 'PWD') }}"
      failed_when: ansible_playbook_pwd == ''

    - name: Stop bootstrap VM
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        state: destroyed
      with_items:
        - "{{ bootstrap }}"
      failed_when: false

    - name: Record bootstrap VM disk image path
      ansible.builtin.shell: >
        set -o pipefail &&
        virsh domblklist {{ dns.clusterid }}.{{ item.name }} | grep {{ disk }} | awk '{print $2}'
      with_items:
        - "{{ bootstrap }}"
      failed_when: false
      changed_when: false
      # with_items result is a dict with .results — used below when setting facts
      register: bsvmpath
      tags:
        - vm_image_path_dict

    - name: Set bootstrap VM disk image path fact
      ansible.builtin.set_fact:
        ocp_vms_bootstrap_vm_path: "{{ bsvmpath.results[0].stdout }}"

    - name: Pause for 15 seconds before undefining bootstrap VM
      ansible.builtin.pause:
        seconds: 15

    - name: Undefine bootstrap VM
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        command: undefine
      with_items:
        - "{{ bootstrap }}"
      failed_when: false

    - name: Remove bootstrap VM disk image
      # virt module does not remove the disk image on undefine, so we remove it explicitly
      ansible.builtin.file:
        path: "{{ ocp_vms_bootstrap_vm_path }}"
        state: absent

- name: Remove bootstrap node from HAProxy and restart service
  hosts: util
  become: true
  gather_facts: false
  tasks:
    - name: Wait for util node connection
      ansible.builtin.wait_for_connection:
        connect_timeout: 20
        sleep: 5
        delay: 5
        timeout: 300

    - name: Remove bootstrap node from HAProxy API and machine-config backends
      ansible.builtin.lineinfile:
        path: /etc/haproxy/haproxy.cfg
        regexp: "server bootstrap"
        state: absent

    - name: Restart haproxy service
      ansible.builtin.service:
        name: haproxy
        state: restarted
