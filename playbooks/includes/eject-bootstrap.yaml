---
- name: Capture ansible-playbook working directory
  run_once: true
  ansible.builtin.set_fact:
    ansible_playbook_pwd: "{{ lookup('env', 'PWD') }}"
  failed_when: ansible_playbook_pwd == ''

- name: Stop bootstrap VM
  community.libvirt.virt:
    name: "{{ dns.clusterid }}.{{ item.name }}"
    state: destroyed
  with_items:
    - "{{ bootstrap }}"
  failed_when: false

- name: Record bootstrap VM disk image path
  ansible.builtin.shell: >
    set -o pipefail &&
    virsh domblklist {{ dns.clusterid }}.{{ item.name }} | grep {{ disk }} | awk '{print $2}'
  with_items:
    - "{{ bootstrap }}"
  failed_when: false
  changed_when: false
  # with_items result is a dict with .results — used below when setting facts
  register: bsvmpath
  tags:
    - vm_image_path_dict

- name: Set bootstrap VM disk image path fact
  ansible.builtin.set_fact:
    ocp_vms_bootstrap_vm_path: "{{ bsvmpath.results[0].stdout }}"

- name: Undefine bootstrap VM
  community.libvirt.virt:
    name: "{{ dns.clusterid }}.{{ item.name }}"
    command: undefine
  with_items:
    - "{{ bootstrap }}"
  failed_when: false

- name: Pause for 5 seconds before removing bootstrap VM disk image
  ansible.builtin.pause:
    seconds: 5

- name: Remove bootstrap VM disk image
  # virt module does not remove the disk image on undefine, so we remove it explicitly
  ansible.builtin.file:
    path: "{{ ocp_vms_bootstrap_vm_path }}"
    state: absent
