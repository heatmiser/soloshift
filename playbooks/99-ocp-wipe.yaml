---
- name: Verify and activate libvirt private network
  hosts: hypervisor
  become: true
  tasks:
    - name: Verify libvirt private network is active
      ansible.builtin.shell: >
        set -o pipefail &&
        virsh net-list --all | grep {{ ocp_vms_openshift_subdomain }}-private | awk '{print $2}'
      args:
        executable: /bin/bash
      register: network_state
      changed_when: false
      tags:
        - network_state

    - name: Display network state
      ansible.builtin.debug:
        var: network_state.stdout
      tags:
        - network_state

    - name: Activate libvirt private network
      ansible.builtin.shell: >
        virsh net-start {{ ocp_vms_openshift_subdomain }}-private
      changed_when: true
      when:
        - network_state.stdout == "inactive"
      tags:
        - network_state

    - name: Start util vm
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ util.name }}"
        state: running
      when:
        - ocp_vms_util_node

- name: Wait for util VM connection
  hosts: util
  become: true
  gather_facts: false
  tasks:
    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 120
      when:
        - ocp_vms_util_node

- name: Deregister util node prior to deletion
  hosts: util
  become: true
  tasks:
    - name: Deregister util node from RHN
      ansible.builtin.import_role:
        name: devnullcake.redhat-subscription
      vars:
        redhat_subscription_state: absent
      register: deregister_result
      when:
        - ansible_distribution == 'RedHat'
        - ocp_vms_util_node

- name: Wipe OpenShift cluster VMs and disks
  hosts: hypervisor
  become: true
  tasks:
    - name: Ansible-playbook pwd
      run_once: true
      ansible.builtin.set_fact:
        ansible_playbook_pwd: "{{ lookup('env', 'PWD') }}"
      failed_when: ansible_playbook_pwd == ''

    - name: Stop utility vm
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ util.name }}"
        state: destroyed

    - name: Stop bootstrap vm
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        state: destroyed
      with_items:
        - "{{ bootstrap }}"
      failed_when: false

    - name: Stop control-plane vm(s)
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        state: destroyed
      with_items:
        - "{{ controlplane }}"

    - name: Stop infra vm(s)
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        state: destroyed
      with_items:
        - "{{ infras }}"
      when: infras | length > 0

    - name: Stop worker vm(s)
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        state: destroyed
      with_items:
        - "{{ workers }}"

    - name: Create temporary file for utility image properties
      ansible.builtin.tempfile:
        state: file
        suffix: .temp
      register: utilpropstemp_1

    - name: Dump utility VM XML properties to temp file
      ansible.builtin.shell: >
        virsh dumpxml {{ dns.clusterid }}.{{ util.name }} > {{ utilpropstemp_1.path }}
      changed_when: true
      tags:
        - ocp_vms_util_image_props

    - name: Query props file for utility VM disk devices
      community.general.xml:
        path: "{{ utilpropstemp_1.path }}"
        xpath: /domain/devices/disk/target
        content: attribute
      register: devices_xml_text
      tags:
        - ocp_vms_util_image_props

    - name: Remove utility VM props temp file
      ansible.builtin.file:
        path: "{{ utilpropstemp_1.path }}"
        state: absent
      when: utilpropstemp_1.path is defined

    - name: Display utility VM disk device list
      ansible.builtin.debug:
        msg: "{{ dns.clusterid }}.{{ util.name }} device list ==> {{ devices_xml_text.matches | map(attribute='target.dev') | list }}"
      tags:
        - ocp_vms_util_image_props

    - name: Display utility VM disk devices
      ansible.builtin.debug:
        msg: "{{ dns.clusterid }}.{{ util.name }} device ==> {{ item }}"
      with_items: "{{ devices_xml_text.matches | map(attribute='target.dev') | list }}"
      tags:
        - ocp_vms_util_image_props

    - name: Start utility VM image path ini section
      ansible.builtin.shell: >
        echo "" >> /tmp/vm_img_path.ini;
        echo "[utility]" >> /tmp/vm_img_path.ini
      changed_when: true
      tags:
        - vm_image_path_dict

    - name: Record utility VM image path
      ansible.builtin.shell: >
        imgpath=$(virsh domblklist {{ dns.clusterid }}.{{ util.name }} | grep {{ item }} | awk '{print $2}');
        echo "{{ util.name }}-{{ item }}.imgpath=$imgpath" >> /tmp/vm_img_path.ini;
        echo "" >> /tmp/vm_img_path.ini
      changed_when: true
      with_items: "{{ devices_xml_text.matches | map(attribute='target.dev') | list }}"
      tags:
        - vm_image_path_dict

    - name: Record bootstrap VM image path
      ansible.builtin.shell: >
        imgpath=$(virsh domblklist {{ dns.clusterid }}.{{ item.name }} | grep {{ disk }} | awk '{print $2}');
        echo "[bootstrap]" >> /tmp/vm_img_path.ini;
        echo "{{ item.name }}.imgpath=$imgpath" >> /tmp/vm_img_path.ini
      changed_when: true
      failed_when: false
      with_items:
        - "{{ bootstrap }}"
      tags:
        - vm_image_path_dict

    - name: Start control-plane VM image path ini section
      ansible.builtin.shell: >
        echo "" >> /tmp/vm_img_path.ini;
        echo "[controlplane]" >> /tmp/vm_img_path.ini
      changed_when: true
      tags:
        - vm_image_path_dict

    - name: Record control-plane VM image path
      ansible.builtin.shell: >
        imgpath=$(virsh domblklist {{ dns.clusterid }}.{{ item.name }} | grep {{ disk }} | awk '{print $2}');
        echo "{{ item.name }}.imgpath=$imgpath" >> /tmp/vm_img_path.ini
      changed_when: true
      with_items:
        - "{{ controlplane }}"
      tags:
        - vm_image_path_dict

    - name: Start infra VM image path ini section
      ansible.builtin.shell: >
        echo "" >> /tmp/vm_img_path.ini;
        echo "[infras]" >> /tmp/vm_img_path.ini
      changed_when: true
      when: infras | length > 0
      tags:
        - vm_image_path_dict

    - name: Record infra VM image path
      ansible.builtin.shell: >
        imgpath=$(virsh domblklist {{ dns.clusterid }}.{{ item.name }} | grep {{ disk }} | awk '{print $2}');
        echo "{{ item.name }}.imgpath=$imgpath" >> /tmp/vm_img_path.ini
      changed_when: true
      with_items:
        - "{{ infras }}"
      when: infras | length > 0
      tags:
        - vm_image_path_dict

    - name: Start worker VM image path ini section
      ansible.builtin.shell: >
        echo "" >> /tmp/vm_img_path.ini;
        echo "[workers]" >> /tmp/vm_img_path.ini
      changed_when: true
      tags:
        - vm_image_path_dict

    - name: Record worker VM image path
      ansible.builtin.shell: >
        imgpath=$(virsh domblklist {{ dns.clusterid }}.{{ item.name }} | grep {{ disk }} | awk '{print $2}');
        echo "{{ item.name }}.imgpath=$imgpath" >> /tmp/vm_img_path.ini
      changed_when: true
      with_items:
        - "{{ workers }}"
      tags:
        - vm_image_path_dict

    - name: Pause for 5 seconds
      ansible.builtin.pause:
        seconds: 5

    - name: Undefine utility vm
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ util.name }}"
        command: undefine

    - name: Undefine bootstrap vm
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        command: undefine
      with_items:
        - "{{ bootstrap }}"
      failed_when: false

    - name: Undefine control-plane vm(s)
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        command: undefine
      with_items:
        - "{{ controlplane }}"

    - name: Undefine infra vm(s)
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        command: undefine
      with_items:
        - "{{ infras }}"
      when: infras | length > 0

    - name: Undefine worker vm(s)
      community.libvirt.virt:
        name: "{{ dns.clusterid }}.{{ item.name }}"
        command: undefine
      with_items:
        - "{{ workers }}"

    - name: Remove utility vm image file
      vars:
        vm_image_path: "{{ lookup('ini', '{{ util.name }}-{{ item }}.imgpath section=utility file=/tmp/vm_img_path.ini') }}"
      ansible.builtin.shell: >
        virt-format -a {{ vm_image_path }};
        rm -f {{ vm_image_path }}
      changed_when: true
      with_items: "{{ devices_xml_text.matches | map(attribute='target.dev') | list }}"

    - name: Remove bootstrap vm image file
      vars:
        vm_image_path: "{{ lookup('ini', '{{ item.name }}.imgpath section=bootstrap file=/tmp/vm_img_path.ini') }}"
      ansible.builtin.shell: >
        virt-format -a {{ vm_image_path }};
        rm -f {{ vm_image_path }}
      changed_when: true
      failed_when: false
      with_items:
        - "{{ bootstrap }}"

    - name: Remove control-plane vm image file(s)
      vars:
        vm_image_path: "{{ lookup('ini', '{{ item.name }}.imgpath section=controlplane file=/tmp/vm_img_path.ini') }}"
      ansible.builtin.shell: >
        virt-format -a {{ vm_image_path }};
        rm -f {{ vm_image_path }}
      changed_when: true
      with_items:
        - "{{ controlplane }}"

    - name: Remove infra vm image file(s)
      vars:
        vm_image_path: "{{ lookup('ini', '{{ item.name }}.imgpath section=infras file=/tmp/vm_img_path.ini') }}"
      ansible.builtin.shell: >
        virt-format -a {{ vm_image_path }};
        rm -f {{ vm_image_path }}
      changed_when: true
      with_items:
        - "{{ infras }}"
      when: infras | length > 0

    - name: Remove worker vm image file(s)
      vars:
        vm_image_path: "{{ lookup('ini', '{{ item.name }}.imgpath section=workers file=/tmp/vm_img_path.ini') }}"
      ansible.builtin.shell: >
        virt-format -a {{ vm_image_path }};
        rm -f {{ vm_image_path }}
      changed_when: true
      with_items:
        - "{{ workers }}"

    - name: Remove vm image backing file
      vars:
        vm_image_path: "{{ util.vm_image_backing_file }}"
      ansible.builtin.shell: >
        virt-format -a {{ vm_image_path }};
        rm -f {{ vm_image_path }}
      changed_when: true

    - name: Remove libvirt network
      community.libvirt.virt_net:
        name: "{{ ocp_vms_openshift_subdomain }}-private"
        state: "{{ item }}"
      with_items:
        - inactive
        - absent

    - name: Remove VM-specific deploy files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{ ansible_playbook_pwd }}/inventory/{{ ocp_vms_openshift_subdomain }}_vms"
        - "{{ playbook_dir }}/install-config.yaml.intermediate.j2"
        - "{{ ansible_playbook_pwd }}/inventory/group_vars/all/vars.yaml"
        - "{{ ansible_playbook_pwd }}/ocp4upi"
        - /tmp/vm_img_path.ini
