---
# Post OCP4 Solo Lab install - OCP pip modules
# kubernetes client version tracks the k8s server version (OCP 4.16 = k8s 1.29 = kubernetes 29.x)

- name: Install kubernetes pip module for Python 3
  ansible.builtin.pip:
    name: kubernetes==29.0.0
    executable: pip3
    extra_args: --user

- name: Install openshift pip module for Python 3
  ansible.builtin.pip:
    name: openshift==0.13.2
    executable: pip3
    extra_args: --user
