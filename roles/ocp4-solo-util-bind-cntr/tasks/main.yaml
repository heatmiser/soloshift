---
# build and configure bind container
- name: Ensure group "named" exists
  ansible.builtin.group:
    name: named
    gid: 25
    state: present

- name: Ensure "named" user exists
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ item.group }}"
    comment: "{{ item.comment }}"
    home: "{{ item.home }}"
    uid: "{{ item.uid }}"
    state: present
    shell: "{{ item.shell }}"
  with_items:
    - { name: "named", group: "named", comment: "Named", home: "/var/named", uid: 25, shell: "/sbin/nologin" }

- name: Ensure named container config and log directories exist
  ansible.builtin.file:
    path: /srv/cntr_mounts/bind/{{ item }}
    state: directory
    owner: named
    group: named
    mode: "0700"
  with_items:
    - logs
    - configs

- name: Generate DNS zone serial number from current date
  ansible.builtin.command: "date +%Y%m%d00"
  register: dymanicserialnumber
  changed_when: false

- name: Set serial number fact
  ansible.builtin.set_fact:
    serialnumber: "{{ dymanicserialnumber.stdout }}"

- name: Write out forward zone file for "{{ dns.domain }}"
  ansible.builtin.template:
    src: bind/zonefile.j2
    dest: /srv/cntr_mounts/bind/configs/master.{{ dns.domain }}.db
    owner: named
    group: named
    mode: "0640"

- name: Write out reverse zone file for "{{ dns.domain }}"
  ansible.builtin.template:
    src: bind/reverse.j2
    dest: /srv/cntr_mounts/bind/configs/reverse.{{ dns.domain }}.db
    owner: named
    group: named
    mode: "0640"

- name: Prep base container image
  ansible.builtin.import_role:
    name: v1-cntr-img-build-prep

- name: Add the newly created container to the inventory
  ansible.builtin.add_host:
    hostname: "{{ container_name }}"
    ansible_connection: "{{ container_engine }}"
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: true
    become_user: root

- name: Run bind role in the container
  delegate_to: "{{ container_name }}"
  ansible.builtin.import_role:
    name: util-bind-cntr

- name: Write out named.conf file
  delegate_to: "{{ container_name }}"
  ansible.builtin.template:
    src: bind/named.conf.j2
    dest: /etc/named.conf
    owner: named
    group: named
    mode: "0640"

- name: Build and commit BIND container image (buildah)
  when: container_engine == 'buildah'
  block:
    - name: Set default command for BIND container image
      ansible.builtin.command: 'buildah config --cmd "/usr/sbin/named -u named -f" {{ container_name }}'
      changed_when: true

    - name: Expose DNS ports 53/udp and 53/tcp in BIND container image
      ansible.builtin.command: "buildah config --port 53/udp --port 53/tcp {{ container_name }}"
      changed_when: true

    - name: Check if BIND image already exists
      ansible.builtin.command: podman inspect localhost/{{ image_name }}:latest
      register: inspectout
      changed_when: false
      failed_when: false

    - name: Remove existing BIND image before re-commit
      ansible.builtin.command: podman rmi localhost/{{ image_name }}:latest
      changed_when: true
      when: '"error getting image" not in inspectout.stderr'

    - name: Commit build container to BIND image
      ansible.builtin.command: "buildah commit --rm {{ container_name }} {{ image_name }}:latest"
      changed_when: true

- name: Build and commit BIND container image (docker)
  when: container_engine == 'docker'
  block:
    - name: Commit build container to BIND image
      ansible.builtin.command: >
        docker commit
        -c 'CMD ["/usr/sbin/named", "-u", "named", "-f"]'
        {{ container_name }} {{ image_name }}
      changed_when: true

    - name: Remove the build container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
