---
# role to install bind and configure for containerized operation
- name: Install bind
  ansible.builtin.dnf:
    name:
      - bind
      - bind-utils
    state: installed

- name: Clean dnf metadata
  ansible.builtin.command: dnf clean all
  changed_when: false

- name: Generate rndc key
  ansible.builtin.command: rndc-confgen -a -c /etc/rndc.key
  args:
    creates: /etc/rndc.key
  changed_when: true

- name: Set ownership of rndc key to named
  ansible.builtin.file:
    path: /etc/rndc.key
    owner: named
    group: named
    mode: "0640"

- name: Ensure named primary zone and logging directories are present
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: named
    group: named
    mode: "0755"
  with_items:
    - /var/log/named
    - /var/named/primary
